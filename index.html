<!DOCTYPE html>
<html>
<head>

<title>AI Resume Screening System</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:600px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h1{
color:#333;
}

textarea{
width:100%;
height:150px;
padding:10px;
margin-top:10px;
}

input[type=file]{
margin-top:10px;
}

button{
margin-top:20px;
padding:10px 20px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

.result{
margin-top:30px;
text-align:left;
}

ul{
background:#fafafa;
padding:15px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="container">

<h1>AI Resume Screening System</h1>

<form method="POST" enctype="multipart/form-data">

<label><b>Upload Resume (PDF)</b></label><br>
<input type="file" name="resume" required>

<br><br>

<label><b>Paste Job Description</b></label>

<textarea name="jd" placeholder="Paste job description here..." required></textarea>

<br>

<button type="submit">Analyze Resume</button>

</form>

<div class="result">

<h2>Match Score: {{score}} %</h2>

<h3>Detected Skills</h3>

<ul>
{% for skill in skills %}
<li>{{skill}}</li>
{% endfor %}
</ul>

<h3>Missing Skills</h3>

<ul>
{% for skill in missing %}
<li>{{skill}}</li>
{% endfor %}
</ul>

</div>

</div>

</body>
</html>
